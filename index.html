<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>焼肉おすすめ診断</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    margin: 0;
    background: #0d0d0d;   /* 黒 */
    color: white;       /* 文字を白に */
}

h1 {
    background: #3b2a1f;
    color: white;
    padding: 20px;
    margin: 0;
}

.container {
    padding: 20px;
}

img {
    width: 100%;
    max-width: 500px;
}

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #c0392b;
    color: white;
}

button {
    background: #e74c3c;  /* 赤を少し強めに */
}

.result {
    margin-top: 20px;
    padding: 20px;
    background: #222;   /* 少し明るい黒 */
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🥩 焼肉おすすめ診断</h1>

<div class="container">

<p id="question">脂は好き？</p>

<div id="buttons">
    <button onclick="answer('yes')">YES</button>
    <button class="no" onclick="answer('no')">NO</button>
</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<script>
let step = 1;

function answer(choice) {
    const q = document.getElementById("question");
    const res = document.getElementById("result");

    if(step === 1) {
        if(choice === "yes") {
            q.innerText = "こってり派？";
            step = 2;
        } else {
            q.innerText = "あっさり派？";
            step = 3;
        }
    }

    else if(step === 2) {
        if(choice === "yes") {
            showResult("🥓 脂多め", "カルビ・上ロースがおすすめ！");
        } else {
            showResult("🥩 バランス", "ロース・ハラミがおすすめ！");
        }
    }

    else if(step === 3) {
        if(choice === "yes") {
            showResult("🍖 赤身", "ランプ・イチボがおすすめ！");
        } else {
            showResult("🍗 食感派", "タン・ミノがおすすめ！");
        }
    }
}

function showResult(title, text) {
    document.getElementById("buttons").style.display = "none";
    const res = document.getElementById("result");
    res.style.display = "block";
    res.innerHTML = "<h2>" + title + "</h2><p>" + text + "</p>";
}
</script>

</body>
</html>
