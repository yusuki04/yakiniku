<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>焼肉のすすめ</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    margin: 0;
    background: #111;
    color: white;
}

h1 {
    background: #3b2a1f;
    color: white;
    padding: 20px;
    margin: 0;
}

.container {
    padding: 20px;
}

#question {
    font-size: 28px;
    margin-top: 40px;
}

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #c0392b;
    color: white;
}

button.no {
    background: #555;
}

.result {
    margin-top: 20px;
    padding: 20px;
    background: #222;
    border-radius: 10px;
}

img {
    width: 100%;
    max-width: 300px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>

</head>

<body>

<h1>焼肉のすすめ</h1>

<div class="container">

<p id="question">脂は好き？</p>

<div id="buttons">
    <button onclick="answer('yes')">YES</button>
    <button class="no" onclick="answer('no')">NO</button>
</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<script>
let step = 1;

function answer(choice) {
    const q = document.getElementById("question");

    if(step === 1) {
        if(choice === "yes") {
            q.innerText = "こってり派？";
            step = 2;
        } else {
            q.innerText = "あっさり派？";
            step = 3;
        }
    }

    else if(step === 2) {
        if(choice === "yes") {
            showResult("脂多め", "カルビ・上ロース");
        } else {
            showResult("バランス", "ロース・ハラミ");
        }
    }

    else if(step === 3) {
        if(choice === "yes") {
            showResult("赤身", "ランプ・イチボ");
        } else {
            showResult("食感派", "タン・ミノ");
        }
    }
}

function showResult(type, menu) {
    document.getElementById("buttons").style.display = "none";
    const res = document.getElementById("result");
    res.style.display = "block";

    let img = "";

    if(type === "脂多め") {
        img = "https://source.unsplash.com/300x200/?yakiniku";
    } else if(type === "バランス") {
        img = "https://source.unsplash.com/300x200/?beef";
    } else if(type === "赤身") {
        img = "https://source.unsplash.com/300x200/?steak";
    } else {
        img = "https://source.unsplash.com/300x200/?tongue";
    }

    res.innerHTML = `
        <h2>${type}</h2>
        <img src="${img}">
        <p>${menu}</p>
        <p>🔥 800円〜</p>
        <button onclick="location.reload()">もう一回診断</button>
    `;
}
</script>

</body>
</html>
